<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GFR Remediation Tool — Ingestion Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .id-chip {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.75rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            padding: 0.125rem 0.5rem;
            color: #475569;
            cursor: pointer;
            transition: background 0.15s;
        }

            .id-chip:hover {
                background: #e2e8f0;
            }

            .id-chip.copied {
                background: #dcfce7;
                color: #166534;
                border-color: #bbf7d0;
            }

        .tab-btn {
            padding: 0.625rem 1.25rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: #64748b;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
        }

            .tab-btn:hover {
                color: #1e293b;
            }

            .tab-btn.active {
                color: #2563eb;
                border-bottom-color: #2563eb;
            }

        .badge {
            padding: 0.125rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
        }

        table th {
            position: sticky;
            top: 0;
            background: #f8fafc;
            z-index: 1;
        }

        .spinner {
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            width: 1.5rem;
            height: 1.5rem;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fade-in {
            animation: fadeIn 0.25s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- ===================== HEADER ===================== -->
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold text-lg">G</div>
                <div>
                    <h1 class="text-lg font-bold text-slate-900 leading-tight">GFR Remediation Tool</h1>
                    <p class="text-xs text-slate-500">Ingestion Dashboard · Dev</p>
                </div>
            </div>
            <button id="refreshAllBtn" class="text-sm font-medium text-slate-600 hover:text-blue-600 flex items-center gap-1.5 px-3 py-1.5 rounded-md hover:bg-slate-100 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                Refresh
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-6">

        <!-- ===================== UPLOAD CARD ===================== -->
        <section class="bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
            <h2 class="text-base font-semibold text-slate-900 mb-1">Upload EDG Finding File</h2>
            <p class="text-sm text-slate-500 mb-4">Upload a CSV or Excel file to ingest findings into the remediation tables.</p>

            <div class="flex flex-wrap items-center gap-3">
                <label class="flex-1 min-w-[240px]">
                    <input id="fileInput" type="file" accept=".csv,.xlsx,.xls"
                           class="block w-full text-sm text-slate-600 border border-slate-300 rounded-lg cursor-pointer
                   file:mr-4 file:py-2 file:px-4 file:rounded-l-lg file:border-0
                   file:bg-blue-50 file:text-blue-700 file:font-medium file:text-sm
                   hover:file:bg-blue-100" />
                </label>
                <button id="uploadBtn"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-5 py-2.5 rounded-lg
                 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 transition">
                    <span id="uploadBtnText">Upload &amp; Ingest</span>
                    <div id="uploadSpinner" class="spinner hidden" style="border-top-color:#fff; border-color:rgba(255,255,255,.35);"></div>
                </button>
            </div>

            <!-- Result banner -->
            <div id="uploadResult" class="hidden mt-5 fade-in"></div>
        </section>

        <!-- ===================== SUMMARY STAT CARDS ===================== -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                <p class="text-xs font-medium text-slate-500 uppercase tracking-wide">Total Jobs</p>
                <p id="statJobs" class="text-2xl font-bold text-slate-900 mt-1">—</p>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                <p class="text-xs font-medium text-slate-500 uppercase tracking-wide">Total Records Loaded</p>
                <p id="statTotalRecords" class="text-2xl font-bold text-slate-900 mt-1">—</p>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                <p class="text-xs font-medium text-emerald-600 uppercase tracking-wide">Successful</p>
                <p id="statSuccess" class="text-2xl font-bold text-emerald-700 mt-1">—</p>
            </div>
            <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
                <p class="text-xs font-medium text-rose-600 uppercase tracking-wide">Rejected</p>
                <p id="statRejected" class="text-2xl font-bold text-rose-700 mt-1">—</p>
            </div>
        </section>

        <!-- ===================== DATA EXPLORER ===================== -->
        <section class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">

            <!-- Tabs -->
            <div class="border-b border-slate-200 px-4 flex items-center gap-1 overflow-x-auto">
                <button class="tab-btn active" data-tab="jobs">Job Metadata</button>
                <button class="tab-btn" data-tab="findings">Findings (Success)</button>
                <button class="tab-btn" data-tab="rejected">Rejected Rows</button>
            </div>

            <!-- Filter bar -->
            <div class="p-4 border-b border-slate-100 bg-slate-50 flex flex-wrap items-center gap-3">

                <!-- Job context (findings/rejected tabs) -->
                <div id="jobFilterWrap" class="hidden flex items-center gap-2">
                    <label class="text-xs font-medium text-slate-500 whitespace-nowrap">Job</label>
                    <select id="jobFilter" class="text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white min-w-[260px]">
                        <option value="">All jobs</option>
                    </select>
                </div>

                <!-- Status filter (jobs tab) -->
                <div id="statusFilterWrap" class="flex items-center gap-2">
                    <label class="text-xs font-medium text-slate-500 whitespace-nowrap">Status</label>
                    <select id="statusFilter" class="text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white">
                        <option value="">All statuses</option>
                    </select>
                </div>

                <!-- Finding type filter (findings tab) -->
                <div id="findingTypeFilterWrap" class="hidden flex items-center gap-2">
                    <label class="text-xs font-medium text-slate-500 whitespace-nowrap">Finding Type</label>
                    <select id="findingTypeFilter" class="text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white">
                        <option value="">All types</option>
                    </select>
                </div>

                <!-- Data system filter (findings tab) -->
                <div id="dataSystemFilterWrap" class="hidden flex items-center gap-2">
                    <label class="text-xs font-medium text-slate-500 whitespace-nowrap">Data System</label>
                    <select id="dataSystemFilter" class="text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white">
                        <option value="">All systems</option>
                    </select>
                </div>

                <!-- Field filter (rejected tab) -->
                <div id="errorReasonFilterWrap" class="hidden flex items-center gap-2">
                    <label class="text-xs font-medium text-slate-500 whitespace-nowrap">Field</label>
                    <select id="errorReasonFilter" class="text-sm border border-slate-300 rounded-md px-2 py-1.5 bg-white">
                        <option value="">All fields</option>
                    </select>
                </div>

                <!-- Search -->
                <div class="flex items-center gap-2 ml-auto">
                    <label class="text-xs font-medium text-slate-500 whitespace-nowrap">Search</label>
                    <input id="searchInput" type="text" placeholder="Type to filter…"
                           class="text-sm border border-slate-300 rounded-md px-3 py-1.5 bg-white w-56" />
                </div>

                <span id="rowCount" class="text-xs text-slate-400 whitespace-nowrap ml-2"></span>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto" style="max-height: 520px;">
                <table class="w-full text-sm">
                    <thead id="tableHead" class="text-left text-slate-500 border-b border-slate-200"></thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100"></tbody>
                </table>
                <div id="loadingState" class="hidden flex items-center justify-center gap-2 text-slate-400 text-sm py-10">
                    <div class="spinner"></div> Loading…
                </div>
                <div id="emptyState" class="hidden text-center text-slate-400 text-sm py-10">No records found.</div>
            </div>

        </section>

    </main>

    <script>
        const API_BASE = '/api/dashboard';

        // ---------------------------------------------------------------
        // State
        // ---------------------------------------------------------------
        const state = {
            activeTab: 'jobs',
            jobs: [],
            findings: [],
            rejectedAll: [],
            rejectedForJob: null,
            selectedJobId: ''
        };

        // ---------------------------------------------------------------
        // Helpers
        // ---------------------------------------------------------------
        function fmtDate(value) {
            if (!value) return '—';
            const d = new Date(value);
            if (isNaN(d.getTime())) return value;
            return d.toLocaleString(undefined, { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function truncate(id, len = 8) {
            if (!id) return '—';
            return id.length > len ? id.slice(0, len) + '…' : id;
        }

        function idChip(id) {
            if (!id) return '<span class="text-slate-400">—</span>';
            const safe = id.replace(/"/g, '&quot;');
            return `<span class="id-chip" title="Click to copy full ID: ${safe}" onclick="copyId(this, '${safe}')">${truncate(id)}</span>`;
        }

        function copyId(el, fullId) {
            navigator.clipboard.writeText(fullId).then(() => {
                const original = el.textContent;
                el.textContent = 'Copied!';
                el.classList.add('copied');
                setTimeout(() => { el.textContent = original; el.classList.remove('copied'); }, 1000);
            });
        }

        const STATUS_COLORS = {
            Success: 'bg-emerald-100 text-emerald-700',
            PartialSuccess: 'bg-amber-100 text-amber-700',
            Failed: 'bg-rose-100 text-rose-700',
            Started: 'bg-blue-100 text-blue-700'
        };

        const FINDING_TYPE_COLORS = {
            Obsolete: 'bg-slate-100 text-slate-700',
            Quarantined: 'bg-amber-100 text-amber-700',
            Restored: 'bg-emerald-100 text-emerald-700',
            Deleted: 'bg-rose-100 text-rose-700',
            NotObsolete: 'bg-blue-100 text-blue-700',
            Exclusion: 'bg-purple-100 text-purple-700'
        };

        function badge(text, colorMap) {
            if (!text) return '<span class="text-slate-400">—</span>';
            const cls = colorMap[text] || 'bg-slate-100 text-slate-700';
            return `<span class="badge ${cls}">${text}</span>`;
        }

        function statusBadge(s) { return badge(s, STATUS_COLORS); }
        function findingTypeBadge(s) { return badge(s, FINDING_TYPE_COLORS); }

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function setLoading(isLoading) {
            document.getElementById('loadingState').classList.toggle('hidden', !isLoading);
            if (isLoading) document.getElementById('emptyState').classList.add('hidden');
        }

        function setEmpty(isEmpty) {
            document.getElementById('emptyState').classList.toggle('hidden', !isEmpty);
        }

        async function fetchJSON(url) {
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Request failed (${res.status}): ${url}`);
            return res.json();
        }

        // ---------------------------------------------------------------
        // Tab definitions: columns + row renderers
        // ---------------------------------------------------------------
        const TAB_CONFIG = {
            jobs: {
                columns: ['Job ID', 'Inbound File', 'Status', 'Total', 'Success', 'Rejected', 'Started'],
                getRows: () => state.jobs,
                renderRow: (j) => `
          <tr class="hover:bg-slate-50 cursor-pointer" onclick="goToJobFindings('${j.jobId}')">
            <td class="px-4 py-2.5">${idChip(j.jobId)}</td>
            <td class="px-4 py-2.5 font-medium text-slate-800">${escapeHtml(j.inboundFileName)}</td>
            <td class="px-4 py-2.5">${statusBadge(j.status)}</td>
            <td class="px-4 py-2.5 text-slate-600">${j.totalRecords ?? 0}</td>
            <td class="px-4 py-2.5 text-emerald-600 font-medium">${j.successCount ?? 0}</td>
            <td class="px-4 py-2.5 text-rose-600 font-medium">${j.rejectCount ?? 0}</td>
            <td class="px-4 py-2.5 text-slate-500 text-xs">${fmtDate(j.startTimestampUtc)}</td>
          </tr>`
            },
            findings: {
                columns: ['ID', 'Source Record ID', 'Finding File', 'Finding Type', 'Data System', 'Site / File Owner', 'Loaded'],
                getRows: () => state.findings,
                renderRow: (f) => `
          <tr class="hover:bg-slate-50">
            <td class="px-4 py-2.5">${idChip(f.id)}</td>
            <td class="px-4 py-2.5">${idChip(f.sourceRecordId)}</td>
            <td class="px-4 py-2.5 font-medium text-slate-800">${escapeHtml(f.findingFileName)}</td>
            <td class="px-4 py-2.5">${findingTypeBadge(f.findingType)}</td>
            <td class="px-4 py-2.5 text-slate-600">${escapeHtml(f.dataSystem || '—')}</td>
            <td class="px-4 py-2.5 text-slate-600 text-xs">${escapeHtml(f.siteOwner || '—')} / ${escapeHtml(f.fileOwner || '—')}</td>
            <td class="px-4 py-2.5 text-slate-500 text-xs">${fmtDate(f.loadDateUtc)}</td>
          </tr>`
            },
            rejected: {
                columns: ['File / Row', 'Job ID', 'Source Record ID', 'Validation Issues', 'Date'],
                getRows: () => state.selectedJobId ? state.rejectedForJob : state.rejectedAll,
                renderRow: (g) => `
          <tr class="hover:bg-slate-50 align-top">
            <td class="px-4 py-3">
              <div class="font-medium text-slate-800">${escapeHtml(g.findingFileName || '—')}</div>
              <div class="text-xs text-slate-400 mt-0.5">Row #${g.rowNumber ?? '—'}</div>
            </td>
            <td class="px-4 py-3">${idChip(g.jobId)}</td>
            <td class="px-4 py-3">${idChip(g.sourceRecordId)}</td>
            <td class="px-4 py-3">
              <span class="badge bg-rose-100 text-rose-700 mb-1.5 inline-block">${g.issues.length} issue${g.issues.length > 1 ? 's' : ''} found</span>
              <div class="space-y-1.5 mt-1">
                ${g.issues.map(i => `
                  <div class="flex items-start gap-2">
                    <span class="badge bg-slate-100 text-slate-600 font-mono whitespace-nowrap">${escapeHtml(i.field)}</span>
                    <span class="text-rose-700 text-xs leading-5">${escapeHtml(i.reason)}</span>
                  </div>`).join('')}
              </div>
            </td>
            <td class="px-4 py-3 text-slate-500 text-xs">${fmtDate(g.errorDateUtc)}</td>
          </tr>`
            }
        };

        // ---------------------------------------------------------------
        // Rejected rows grouping — combine multiple field-level validation
        // errors for the same source row into a single visual group, so
        // "Row #1 failed: 3 issues" reads as one unit instead of 3 unrelated rows.
        // ---------------------------------------------------------------
        function groupRejectedRows(rows) {
            const groups = new Map();

            rows.forEach(r => {
                const key = [r.jobId, r.rowNumber, r.findingFileName, r.sourceRecordId].join('|');

                if (!groups.has(key)) {
                    groups.set(key, {
                        jobId: r.jobId,
                        rowNumber: r.rowNumber,
                        findingFileName: r.findingFileName,
                        sourceRecordId: r.sourceRecordId,
                        errorDateUtc: r.errorDateUtc,
                        issues: []
                    });
                }

                groups.get(key).issues.push({
                    field: r.fieldName,
                    reason: r.errorReason,
                    value: r.rejectedValue
                });
            });

            return Array.from(groups.values());
        }

        // ---------------------------------------------------------------
        // Tab switching
        // ---------------------------------------------------------------
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        function switchTab(tab) {
            state.activeTab = tab;

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));

            document.getElementById('jobFilterWrap').classList.toggle('hidden', tab === 'jobs');
            document.getElementById('statusFilterWrap').classList.toggle('hidden', tab !== 'jobs');
            document.getElementById('findingTypeFilterWrap').classList.toggle('hidden', tab !== 'findings');
            document.getElementById('dataSystemFilterWrap').classList.toggle('hidden', tab !== 'findings');
            document.getElementById('errorReasonFilterWrap').classList.toggle('hidden', tab !== 'rejected');

            document.getElementById('searchInput').value = '';

            loadActiveTabData();
        }

        // ---------------------------------------------------------------
        // Job context — clicking a job row jumps to its findings
        // ---------------------------------------------------------------
        async function goToJobFindings(jobId) {
            state.selectedJobId = jobId;
            document.getElementById('jobFilter').value = jobId;
            switchTab('findings');
        }

        document.getElementById('jobFilter').addEventListener('change', (e) => {
            state.selectedJobId = e.target.value;
            loadActiveTabData();
        });

        // ---------------------------------------------------------------
        // Data loading
        // ---------------------------------------------------------------
        async function loadActiveTabData() {
            setLoading(true);
            setEmpty(false);
            renderTableHead();

            try {
                if (state.activeTab === 'jobs') {
                    if (state.jobs.length === 0) state.jobs = await fetchJSON(`${API_BASE}/jobs`);
                    populateStatusFilter();
                }
                else if (state.activeTab === 'findings') {
                    if (!state.selectedJobId) {
                        state.findings = [];
                    } else {
                        state.findings = await fetchJSON(`${API_BASE}/jobs/${encodeURIComponent(state.selectedJobId)}/findings`);
                    }
                    populateFindingTypeFilter();
                    populateDataSystemFilter();
                }
                else if (state.activeTab === 'rejected') {
                    if (state.selectedJobId) {
                        state.rejectedForJob = await fetchJSON(`${API_BASE}/jobs/${encodeURIComponent(state.selectedJobId)}/rejected`);
                    } else {
                        if (state.rejectedAll.length === 0) state.rejectedAll = await fetchJSON(`${API_BASE}/rejected`);
                    }
                    populateErrorReasonFilter();
                }
            } catch (err) {
                console.error(err);
            }

            setLoading(false);
            renderTable();
        }

        // ---------------------------------------------------------------
        // Filter population (dynamic, based on loaded data)
        // ---------------------------------------------------------------
        function populateSelect(id, values, current) {
            const select = document.getElementById(id);
            const placeholder = select.options[0];
            select.innerHTML = '';
            select.appendChild(placeholder);
            [...new Set(values)].filter(Boolean).sort().forEach(v => {
                const opt = document.createElement('option');
                opt.value = v; opt.textContent = v;
                select.appendChild(opt);
            });
            select.value = current || '';
        }

        function populateStatusFilter() {
            populateSelect('statusFilter', state.jobs.map(j => j.status), document.getElementById('statusFilter').value);
        }
        function populateFindingTypeFilter() {
            populateSelect('findingTypeFilter', state.findings.map(f => f.findingType), document.getElementById('findingTypeFilter').value);
        }
        function populateDataSystemFilter() {
            populateSelect('dataSystemFilter', state.findings.map(f => f.dataSystem), document.getElementById('dataSystemFilter').value);
        }
        function populateErrorReasonFilter() {
            const rows = state.selectedJobId ? state.rejectedForJob : state.rejectedAll;
            populateSelect('errorReasonFilter', rows.map(r => r.fieldName), document.getElementById('errorReasonFilter').value);
        }

        function populateJobFilterDropdown() {
            const select = document.getElementById('jobFilter');
            const current = select.value;
            select.innerHTML = '<option value="">All jobs</option>';
            state.jobs.forEach(j => {
                const opt = document.createElement('option');
                opt.value = j.jobId;
                opt.textContent = `${j.inboundFileName} — ${truncate(j.jobId, 14)}`;
                select.appendChild(opt);
            });
            select.value = current;
        }

        // ---------------------------------------------------------------
        // Filtering + rendering
        // ---------------------------------------------------------------
        ['statusFilter', 'findingTypeFilter', 'dataSystemFilter', 'errorReasonFilter', 'searchInput'].forEach(id => {
            document.getElementById(id).addEventListener('input', renderTable);
        });

        function applyFilters(rows) {
            const search = document.getElementById('searchInput').value.trim().toLowerCase();

            if (state.activeTab === 'jobs') {
                const status = document.getElementById('statusFilter').value;
                return rows.filter(r =>
                    (!status || r.status === status) &&
                    (!search || JSON.stringify(r).toLowerCase().includes(search)));
            }

            if (state.activeTab === 'findings') {
                const type = document.getElementById('findingTypeFilter').value;
                const sys = document.getElementById('dataSystemFilter').value;
                return rows.filter(r =>
                    (!type || r.findingType === type) &&
                    (!sys || r.dataSystem === sys) &&
                    (!search || JSON.stringify(r).toLowerCase().includes(search)));
            }

            if (state.activeTab === 'rejected') {
                const field = document.getElementById('errorReasonFilter').value;
                return rows.filter(r =>
                    (!field || r.fieldName === field) &&
                    (!search || JSON.stringify(r).toLowerCase().includes(search)));
            }

            return rows;
        }

        function renderTableHead() {
            const cfg = TAB_CONFIG[state.activeTab];
            document.getElementById('tableHead').innerHTML = `
        <tr>${cfg.columns.map(c => `<th class="px-4 py-2.5 font-semibold text-xs uppercase tracking-wide text-slate-500">${c}</th>`).join('')}</tr>`;
        }

        function renderTable() {
            const cfg = TAB_CONFIG[state.activeTab];
            const allRows = cfg.getRows();
            const filteredRows = applyFilters(allRows);

            const tbody = document.getElementById('tableBody');

            if (state.activeTab === 'findings' && !state.selectedJobId) {
                document.getElementById('rowCount').textContent = '';
                tbody.innerHTML = '';
                setEmpty(true);
                document.getElementById('emptyState').textContent = 'Select a job above to view its findings.';
                return;
            }

            document.getElementById('emptyState').textContent = 'No records found.';

            if (state.activeTab === 'rejected') {
                const groups = groupRejectedRows(filteredRows);

                document.getElementById('rowCount').textContent =
                    `${groups.length} row${groups.length === 1 ? '' : 's'} · ${filteredRows.length} issue${filteredRows.length === 1 ? '' : 's'}`;

                setEmpty(groups.length === 0);
                tbody.innerHTML = groups.map(cfg.renderRow).join('');
                return;
            }

            document.getElementById('rowCount').textContent =
                `${filteredRows.length} of ${allRows.length} record${allRows.length === 1 ? '' : 's'}`;

            setEmpty(filteredRows.length === 0);
            tbody.innerHTML = filteredRows.map(cfg.renderRow).join('');
        }

        // ---------------------------------------------------------------
        // Summary stat cards
        // ---------------------------------------------------------------
        function renderStats() {
            const jobs = state.jobs;
            document.getElementById('statJobs').textContent = jobs.length;
            document.getElementById('statTotalRecords').textContent = jobs.reduce((sum, j) => sum + (j.totalRecords || 0), 0);
            document.getElementById('statSuccess').textContent = jobs.reduce((sum, j) => sum + (j.successCount || 0), 0);
            document.getElementById('statRejected').textContent = jobs.reduce((sum, j) => sum + (j.rejectCount || 0), 0);
        }

        // ---------------------------------------------------------------
        // Initial load + refresh
        // ---------------------------------------------------------------
        async function refreshAll() {
            state.jobs = await fetchJSON(`${API_BASE}/jobs`);
            state.rejectedAll = await fetchJSON(`${API_BASE}/rejected`);
            populateJobFilterDropdown();
            renderStats();
            loadActiveTabData();
        }

        document.getElementById('refreshAllBtn').addEventListener('click', refreshAll);

        // ---------------------------------------------------------------
        // Upload
        // ---------------------------------------------------------------
        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const resultBox = document.getElementById('uploadResult');

            if (!file) {
                resultBox.className = 'mt-5 fade-in p-4 rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm';
                resultBox.textContent = 'Please choose a file first.';
                resultBox.classList.remove('hidden');
                return;
            }

            const btn = document.getElementById('uploadBtn');
            const btnText = document.getElementById('uploadBtnText');
            const spinner = document.getElementById('uploadSpinner');

            btn.disabled = true;
            btnText.textContent = 'Uploading…';
            spinner.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                const formData = new FormData();
                formData.append('file', file);

                const res = await fetch('/api/ingestion/upload', { method: 'POST', body: formData });
                const data = await res.json();

                if (!res.ok) {
                    resultBox.className = 'mt-5 fade-in p-4 rounded-lg bg-rose-50 border border-rose-200 text-rose-800 text-sm';
                    resultBox.innerHTML = `<strong>Upload failed.</strong> ${escapeHtml(data.message || res.statusText)}`;
                    resultBox.classList.remove('hidden');
                    return;
                }

                resultBox.className = 'mt-5 fade-in p-4 rounded-lg bg-emerald-50 border border-emerald-200';
                resultBox.innerHTML = `
          <div class="flex items-start justify-between flex-wrap gap-3">
            <div>
              <p class="text-sm font-semibold text-emerald-800">✅ Ingestion completed — ${statusBadge(data.status)}</p>
              <p class="text-xs text-emerald-700 mt-1">Job ID: ${idChip(data.jobId)} &nbsp;·&nbsp; ${escapeHtml(data.message || '')}</p>
            </div>
            <div class="flex gap-4 text-sm">
              <div class="text-center"><div class="font-bold text-slate-800">${data.totalRecords ?? 0}</div><div class="text-xs text-slate-500">Total</div></div>
              <div class="text-center"><div class="font-bold text-emerald-600">${data.successCount ?? 0}</div><div class="text-xs text-slate-500">Success</div></div>
              <div class="text-center"><div class="font-bold text-rose-600">${data.rejectCount ?? 0}</div><div class="text-xs text-slate-500">Rejected</div></div>
            </div>
            <button onclick="goToJobFindings('${data.jobId}')" class="text-sm font-semibold text-blue-600 hover:text-blue-700 whitespace-nowrap">View Results →</button>
          </div>`;
                resultBox.classList.remove('hidden');

                fileInput.value = '';
                await refreshAll();
            } catch (err) {
                resultBox.className = 'mt-5 fade-in p-4 rounded-lg bg-rose-50 border border-rose-200 text-rose-800 text-sm';
                resultBox.textContent = `Upload failed: ${err.message}`;
                resultBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Upload & Ingest';
                spinner.classList.add('hidden');
            }
        });

        // ---------------------------------------------------------------
        // Init
        // ---------------------------------------------------------------
        refreshAll();
    </script>

</body>
</html>
