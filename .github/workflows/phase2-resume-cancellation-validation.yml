name: Validate Phase 2 resume cancellation safety

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 2 branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase2-asynchronous-bounded-io
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Apply cancellation safety fix
        run: python3 tools/fix_phase2_resume_cancellation.py

      - name: Restore
        run: dotnet restore RemediationTool.sln

      - name: Build
        run: dotnet build RemediationTool.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RemediationTool.sln --configuration Release --no-build

      - name: Commit validated cancellation fix
        shell: bash
        run: |
          rm .github/workflows/phase2-resume-cancellation-validation.yml
          rm tools/fix_phase2_resume_cancellation.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Preserve cancellation through resume fallback"
          git push origin HEAD:agent/phase2-asynchronous-bounded-io
