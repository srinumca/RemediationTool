name: Run Phase 1 ingestion validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 1 branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase1-parquet-first-ingestion
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Apply Phase 1 changes
        id: apply
        shell: bash
        run: |
          set +e
          python3 - <<'PY' > phase1-apply.log 2>&1
          from pathlib import Path

          workflow = Path('.github/workflows/phase1-apply-validate.yml').read_text(encoding='utf-8')
          marker_start = "          python3 - <<'PY'\n"
          marker_end = "\n          PY\n\n      - name: Restore"
          start = workflow.index(marker_start) + len(marker_start)
          end = workflow.index(marker_end, start)

          output_lines = []
          inside_triple_string = False
          for line in workflow[start:end].splitlines():
              triple_quote_count = line.count("'''")
              if inside_triple_string:
                  if triple_quote_count % 2 == 1:
                      output_lines.append(line[10:] if line.startswith("          ") else line)
                      inside_triple_string = False
                  else:
                      output_lines.append(line)
              else:
                  output_lines.append(line[10:] if line.startswith("          ") else line)
                  if triple_quote_count % 2 == 1:
                      inside_triple_string = True

          script = "\n".join(output_lines)
          exec(compile(script, 'phase1-apply-script', 'exec'))
          PY
          code=$?
          cat phase1-apply.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit apply diagnostics
        if: steps.apply.outputs.exit_code != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f phase1-apply.log
          git commit -m "Capture Phase 1 apply failure"
          git push origin HEAD:agent/phase1-parquet-first-ingestion
          exit 1

      - name: Restore
        if: steps.apply.outputs.exit_code == '0'
        run: dotnet restore RemediationTool.sln

      - name: Build
        id: build
        if: steps.apply.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          dotnet build RemediationTool.sln --configuration Release --no-restore > phase1-build.log 2>&1
          code=$?
          cat phase1-build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit build diagnostics
        if: steps.apply.outputs.exit_code == '0' && steps.build.outputs.exit_code != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f phase1-build.log
          git commit -m "Capture Phase 1 build failure"
          git push origin HEAD:agent/phase1-parquet-first-ingestion
          exit 1

      - name: Test
        if: steps.apply.outputs.exit_code == '0' && steps.build.outputs.exit_code == '0'
        run: dotnet test RemediationTool.sln --configuration Release --no-build

      - name: Commit validated Phase 1 changes
        if: steps.apply.outputs.exit_code == '0' && steps.build.outputs.exit_code == '0'
        shell: bash
        run: |
          rm .github/workflows/phase1-apply-validate.yml
          rm .github/workflows/phase1-pr-runner.yml
          rm -f phase1-apply.log phase1-build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u phase1-apply.log phase1-build.log
          git add src/RemediationTool.Application/Options/IngestionProcessingOptions.cs \
                  src/RemediationTool.Application/Services/IngestionService.cs \
                  src/RemediationTool.Application/Services/IngestionResumeStoreCoordinator.cs \
                  src/RemediationTool.Application/Properties/AssemblyInfo.cs \
                  src/RemediationTool.API/appsettings.json \
                  tests/RemediationTool.Infrastructure.Tests/IngestionResumeStoreCoordinatorTests.cs \
                  .github/workflows/phase1-apply-validate.yml \
                  .github/workflows/phase1-pr-runner.yml
          git commit -m "Implement Parquet-first ingestion resume path"
          git push origin HEAD:agent/phase1-parquet-first-ingestion
