name: Validate final Phase 1 cleanup

on:
  pull_request:
    branches:
      - agent/phase1-parquet-first-ingestion

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase1-remove-staging-copy
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Apply final cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file_path = Path(path)
              text = file_path.read_text(encoding='utf-8')
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'Expected one match in {path}, found {count}')
              file_path.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'src/RemediationTool.Application/Services/IngestionService.cs',
              '''    private async Task<bool> PrepareResumeStoreAsync(
        IngestionUploadResponse response,
        IngestionJobAudit jobAudit,
        IReadOnlyList<FileFinding> validFindings)
''',
              '''    private async Task<bool> PrepareResumeStoreAsync(
        IngestionUploadResponse response,
        IngestionJobAudit jobAudit,
        List<FileFinding> validFindings)
''')

          replace_once(
              'src/RemediationTool.Application/Services/IngestionService.cs',
              '            writeStaging: () => _stagingRepository.SaveValidFindings(response.JobId, validFindings.ToList()),',
              '            writeStaging: () => _stagingRepository.SaveValidFindings(response.JobId, validFindings),')

          replace_once(
              'tests/RemediationTool.Infrastructure.Tests/IngestionResumeStoreCoordinatorTests.cs',
              '''public class IngestionResumeStoreCoordinatorTests
{
''',
              '''public class IngestionResumeStoreCoordinatorTests
{
    [Fact]
    public void Defaults_PreserveLegacyDualStoreBehavior()
    {
        var options = new IngestionProcessingOptions();

        Assert.False(options.UseParquetAsPrimaryResumeStore);
        Assert.True(options.LegacyStagingFallbackEnabled);
        Assert.Equal(1, options.JobAuditProgressUpdateIntervalBatches);
    }

''')
          PY

      - name: Restore
        run: dotnet restore RemediationTool.sln

      - name: Build
        run: dotnet build RemediationTool.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RemediationTool.sln --configuration Release --no-build

      - name: Commit validated cleanup
        shell: bash
        run: |
          rm .github/workflows/phase1-copy-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/RemediationTool.Application/Services/IngestionService.cs \
                  tests/RemediationTool.Infrastructure.Tests/IngestionResumeStoreCoordinatorTests.cs \
                  .github/workflows/phase1-copy-validation.yml
          git commit -m "Remove duplicate staging list allocation"
          git push origin HEAD:agent/phase1-remove-staging-copy
