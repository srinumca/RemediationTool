name: Quality and Performance

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: Remediation API base URL
        required: true
        type: string
      records:
        description: Records generated for each job
        required: true
        default: "10000"
        type: string
      concurrency:
        description: Concurrent upload and ingestion jobs
        required: true
        default: "1"
        type: string
      invalid_percent:
        description: Percentage of intentionally invalid rows
        required: true
        default: "0"
        type: string
      scenario:
        description: Scenario name included in the report
        required: true
        default: ingestion-baseline
        type: string
      runner:
        description: Runner with network access to the target API
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - self-hosted

permissions:
  contents: read

jobs:
  quality:
    name: Build, test, and collect coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RemediationTool.sln

      - name: Build
        shell: bash
        run: |
          mkdir -p artifacts/build
          set -o pipefail
          dotnet build RemediationTool.sln --configuration Release --no-restore 2>&1 | tee artifacts/build/build.log

      - name: Test with coverage
        shell: bash
        run: |
          mkdir -p artifacts/test-results
          set -o pipefail
          dotnet test RemediationTool.sln \
            --configuration Release \
            --no-build \
            --settings coverage.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory artifacts/test-results \
            --logger trx \
            2>&1 | tee artifacts/test-results/test-console.log

      - name: Install coverage report generator
        if: always()
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        if: always()
        run: |
          if find artifacts/test-results -name coverage.cobertura.xml -print -quit | grep -q .; then
            reportgenerator \
              -reports:"artifacts/test-results/**/coverage.cobertura.xml" \
              -targetdir:"artifacts/coverage" \
              -reporttypes:"HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub"
          else
            echo "No coverage files were generated."
          fi

      - name: Publish coverage summary
        if: always()
        run: |
          if [[ -f artifacts/coverage/SummaryGithub.md ]]; then
            cat artifacts/coverage/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Coverage summary unavailable" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-results
          path: |
            artifacts/build
            artifacts/test-results
            artifacts/coverage
          if-no-files-found: warn
          retention-days: 14

  performance:
    name: Execute ingestion performance scenario
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120
    environment: performance-test
    env:
      REMEDIATION_BASE_URL: ${{ inputs.base_url }}
      REMEDIATION_RECORDS: ${{ inputs.records }}
      REMEDIATION_CONCURRENCY: ${{ inputs.concurrency }}
      REMEDIATION_INVALID_PERCENT: ${{ inputs.invalid_percent }}
      REMEDIATION_SCENARIO: ${{ inputs.scenario }}
      REMEDIATION_BEARER_TOKEN: ${{ secrets.REMEDIATION_BEARER_TOKEN }}
      REMEDIATION_OUTPUT: artifacts/performance
      REMEDIATION_ENVIRONMENT: ${{ inputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RemediationTool.sln

      - name: Build performance runner
        run: >-
          dotnet build
          tests/RemediationTool.PerformanceTests/RemediationTool.PerformanceTests.csproj
          --configuration Release
          --no-restore

      - name: Execute performance test
        run: >-
          dotnet run
          --project tests/RemediationTool.PerformanceTests/RemediationTool.PerformanceTests.csproj
          --configuration Release
          --no-build

      - name: Convert HTML report to PDF
        if: always()
        continue-on-error: true
        run: |
          if [[ -f artifacts/performance/STRESS_TEST_RESULTS.html ]]; then
            python -m pip install --disable-pip-version-check weasyprint
            weasyprint artifacts/performance/STRESS_TEST_RESULTS.html artifacts/performance/STRESS_TEST_RESULTS.pdf
          else
            echo "HTML report was not generated; skipping PDF conversion."
          fi

      - name: Publish performance summary
        if: always()
        run: |
          if [[ -f artifacts/performance/STRESS_TEST_RESULTS.md ]]; then
            cat artifacts/performance/STRESS_TEST_RESULTS.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Performance report unavailable" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-results-${{ github.run_number }}
          path: artifacts/performance
          if-no-files-found: warn
          retention-days: 30
