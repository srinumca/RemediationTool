name: .NET CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: |
            **/*.csproj

      - name: Restore
        shell: bash
        run: |
          set -o pipefail
          dotnet restore RemediationTool.sln 2>&1 | tee restore.log

      - name: Build
        shell: bash
        run: |
          set -o pipefail
          dotnet build RemediationTool.sln --configuration Release --no-restore 2>&1 | tee build.log

      - name: Test
        shell: bash
        run: |
          set -o pipefail
          dotnet test RemediationTool.sln --configuration Release --no-build --verbosity normal 2>&1 | tee test.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-validation-logs
          path: |
            restore.log
            build.log
            test.log
          if-no-files-found: ignore
          retention-days: 7
