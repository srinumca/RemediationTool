name: Apply and validate Phase 2 ingestion I/O

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Phase 2 branch
        uses: actions/checkout@v4
        with:
          ref: agent/phase2-asynchronous-bounded-io
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Apply ingestion transformations
        id: apply
        shell: bash
        run: |
          set +e
          python3 tools/normalize_phase2_transform_script.py > phase2-apply.log 2>&1
          code=$?
          if [ "$code" -eq 0 ]; then
            python3 tools/apply_phase2_ingestion.py >> phase2-apply.log 2>&1
            code=$?
          fi
          cat phase2-apply.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit apply diagnostics
        if: steps.apply.outputs.exit_code != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f phase2-apply.log
          git commit -m "Capture Phase 2 apply failure"
          git push origin HEAD:agent/phase2-asynchronous-bounded-io
          exit 1

      - name: Restore
        if: steps.apply.outputs.exit_code == '0'
        run: dotnet restore RemediationTool.sln

      - name: Build
        id: build
        if: steps.apply.outputs.exit_code == '0'
        shell: bash
        run: |
          set +e
          dotnet build RemediationTool.sln --configuration Release --no-restore > phase2-build.log 2>&1
          code=$?
          cat phase2-build.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit build diagnostics
        if: steps.apply.outputs.exit_code == '0' && steps.build.outputs.exit_code != '0'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f phase2-build.log
          git commit -m "Capture Phase 2 build failure"
          git push origin HEAD:agent/phase2-asynchronous-bounded-io
          exit 1

      - name: Test
        if: steps.apply.outputs.exit_code == '0' && steps.build.outputs.exit_code == '0'
        run: dotnet test RemediationTool.sln --configuration Release --no-build

      - name: Commit validated Phase 2 transformations
        if: steps.apply.outputs.exit_code == '0' && steps.build.outputs.exit_code == '0'
        shell: bash
        run: |
          rm .github/workflows/phase2-apply-validate.yml
          rm tools/apply_phase2_ingestion.py
          rm tools/normalize_phase2_transform_script.py
          rm -f phase2-apply.log phase2-build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete asynchronous bounded ingestion I/O"
          git push origin HEAD:agent/phase2-asynchronous-bounded-io
