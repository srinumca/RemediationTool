name: Temporary validation

on:
  push:
    branches:
      - agent/fix-api-startup
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore RemediationTool.sln
      - run: dotnet build RemediationTool.sln --configuration Release --no-restore
      - run: dotnet test RemediationTool.sln --configuration Release --no-build --verbosity normal
